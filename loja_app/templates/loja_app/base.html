{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri Amorim</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="logo">Nutri Amorim</div>
        <div class="search-box">
            <input type="text" placeholder="Pesquisar...">
        </div>
        <div class="auth-button">
            {% if user.is_authenticated %}
                <span>{{ user.username }}</span>
                <a href="{% url 'logout' %}"><button>Sair</button></a>
            {% else %}
                <a href="{% url 'login' %}"><button>Login</button></a>
            {% endif %}
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <ul>
            <li><a href="#">Receitas Medicinais</a></li>
            <li>
                <a href="#" class="toggle">Pesquisas Científicas</a>
                <ul class="submenu">
                    <li><a href="#">Pesquisa 1</a></li>
                    <li><a href="#">Pesquisa 2</a></li>
                </ul>
            </li>
            <li><a href="#"></a></li>
            <li><a href="#">Quem Sou Eu</a></li>
            <li><a href="#">Quem Somos Nós</a></li>
        </ul>
    </div>

    <!-- Conteúdo principal -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Script para toggle do menu -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggles = document.querySelectorAll('.toggle');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', function () {
                    const submenu = this.nextElementSibling;
                    submenu.classList.toggle('show');
                    this.classList.toggle('closed');
                });
            });
        });
    </script>
</body>
</html>
